version: 0.2

phases:
  install:
    commands:
      - pip install --upgrade pip
      - pip install dbt-athena-community

  pre_build:
    commands:
      - mkdir -p ~/.dbt
      - python -c "import os; os.makedirs(os.path.expanduser('~/.dbt'), exist_ok=True)"
      - python << PYEOF
import os
profile_content = """climabr:
  target: prod
  outputs:
    prod:
      type: athena
      database: awsdatacatalog
      region_name: us-east-1
      schema: landing
      s3_staging_dir: s3://proj-clima-dbt-hp/dbt/metadados/
      s3_data_dir: s3://proj-clima-dbt-hp/dbt/table/
      threads: 4
"""
with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
    f.write(profile_content)
PYEOF
      - dbt debug

  build:
    commands:
      - dbt deps
      - dbt run
      - dbt test
      - dbt docs generate

  post_build:
    commands:
      - aws s3 sync target/ s3://www.cimabrhp.com --delete --region us-east-1

artifacts:
  files:
    - target/**/*
