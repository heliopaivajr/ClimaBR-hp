version: 0.2

env:
  variables:
    DBT_DATABASE: awsdatacatalog
    DBT_SCHEMA: landing
    S3_STAGING_DIR: s3://proj-clima-dbt-hp/dbt/metadados/
    S3_DATA_DIR: s3://proj-clima-dbt-hp/dbt/table/
    S3_DOCS_DIR: s3://proj-clima-dbt-hp/docs/
    AWS_REGION: us-east-1

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - pip install --upgrade pip
      - pip install dbt-athena-community

  pre_build:
    commands:
      - mkdir -p ~/.dbt
      - python create_profiles.py

  build:
    commands:
      - dbt deps
      - dbt debug
      - dbt run
      - dbt test
      - dbt docs generate

  post_build:
    commands:
      - aws s3 sync target/ s3://proj-clima-dbt-hp/docs/ --delete

artifacts:
  files:
    - target/**/*
