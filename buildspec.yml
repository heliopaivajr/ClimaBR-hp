version: 0.2

env:
  variables:
    DBT_PROFILES_DIR: /root/.dbt
    DBT_DATABASE: awsdatacatalog
    DBT_SCHEMA: landing
    DBT_REGION: us-east-1
    DBT_S3_STAGING_DIR: s3://proj-clima-dbt-hp/dbt/metadados/
    DBT_S3_DATA_DIR: s3://proj-clima-dbt-hp/dbt/table/

phases:
  install:
    commands:
      - pip install --upgrade pip
      - pip install dbt-athena-community

  pre_build:
    commands:
      - mkdir -p ~/.dbt
      - echo "climabr:" > ~/.dbt/profiles.yml
      - echo "  target: prod" >> ~/.dbt/profiles.yml
      - echo "  outputs:" >> ~/.dbt/profiles.yml
      - echo "    prod:" >> ~/.dbt/profiles.yml
      - echo "      type: athena" >> ~/.dbt/profiles.yml
      - echo "      database: awsdatacatalog" >> ~/.dbt/profiles.yml
      - echo "      region_name: us-east-1" >> ~/.dbt/profiles.yml
      - echo "      schema: landing" >> ~/.dbt/profiles.yml
      - echo "      s3_staging_dir: s3://proj-clima-dbt-hp/dbt/metadados/" >> ~/.dbt/profiles.yml
      - echo "      s3_data_dir: s3://proj-clima-dbt-hp/dbt/table/" >> ~/.dbt/profiles.yml
      - echo "      threads: 4" >> ~/.dbt/profiles.yml
      - dbt debug

  build:
    commands:
      - dbt deps
      - dbt run
      - dbt test
      - dbt docs generate
      - BUILD_DATE=$(TZ=America/Sao_Paulo date +"%d/%m/%Y às %H:%M")
      - sed -i "/<\/body>/i <p style='text-align:center;font-size:11px;color:#666;margin-top:40px;'> Última atualização: ${BUILD_DATE}</p>" target/index.html

  post_build:
    commands:
      - aws s3 sync target/ s3://www.cimabrhp.com --delete --region us-east-1

artifacts:
  files:
    - target/**/*
